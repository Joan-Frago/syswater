<!DOCTYPE html>
<html lang="ca">

<head>
  <meta charset="UTF-8">
  <title>Home Automation</title>
  <link rel="stylesheet" href="../index.css">
</head>

<body>
  <header>
    <div id="nav-cont">
      <nav>
        <a href="../index.html" id="home-page" class="button-header">Home</a>
        <a href="config.html" id="conf-page" class="button-header">Configuració</a>
      </nav>
    </div>
    <div id="title-header">
      <h1>Home Automation</h1>
    </div>
  </header>
  <h1>Configura un pin</h1>
  <div id="general-error"></div>
  <div id="dform">
    <form id="conf-form">
      <label for="iDevice">Dispositiu:</label>
      <select name="iDevice" id="select-idevice" required>
        <option value="">--Select an option--</option>
        <option value="relay">Relé</option>
        <option value="digitalpin">Pin Digital</option>
      </select>
      <label for="iPin">Pin</label>
      <select name="iPin" id="select-ipin" required>
        <option value="">--Select an option--</option>
        <option value="1.1">1.1</option>
        <option value="1.2">1.2</option>
        <option value="1.3">1.3</option>
        <option value="1.4">1.4</option>
        <option value="1.5">1.5</option>
        <option value="1.6">1.6</option>
        <option value="1.7">1.7</option>
        <option value="1.8">1.8</option>
        <option value="2.1">2.1</option>
        <option value="2.2">2.2</option>
        <option value="2.3">2.3</option>
        <option value="2.4">2.4</option>
        <option value="2.5">2.5</option>
        <option value="2.6">2.6</option>
        <option value="2.7">2.7</option>
        <option value="2.8">2.8</option>
      </select>
      <label for="iType">Tipus de pin:</label>
      <select name="iType" id="iType" required>
        <option value="normal">Normal</option>
        <option value="master">Master</option>
      </select>
      <label for="iName">Nom:</label>
      <input type="text" id="iName" name="iName" required>
      <label for="iDesc">Descripció:</label>
      <textarea name="iDesc" id="iDesc"></textarea>
      <label for="isVirtual">Pin Virtual:</label>
      <input type="checkbox" id="isVirtual" name="isVirtual">
      <label for="isHist">Historificar:</label>
      <input type="checkbox" id="isHist" name="isHist">
      <label for="iHistPeriod">Període d'historificació (segons):</label>
      <input type="number" id="iHistPeriod" name="iHistPeriod" min="1">
      <label for="iIO">Input / Output:</label>
      <select name="iIO" id="iIO">
        <option value="io">Input / Output</option>
        <option value="i">Input</option>
        <option value="o">Output</option>
      </select>
    
      <input type="submit" value="Submit" onclick="ConfPin(event)">
    </form>
  </div>
  <script src="conf.js"></script>
</body>
</html>
